# Matrix 7x15 键盘配置
# 确保蓝牙开启；延长空闲休眠时间，避免电池供电后很快停播

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# 指点设备（鼠标/小红点）由 boards/shields/matrix_7x15/Kconfig.defconfig 默认启用；启用后需重新配对蓝牙以更新 HID 描述符

# 空闲 30 分钟后才进入深度休眠（否则电池下可能很快停播蓝牙）
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# 矩阵用轮询而非中断：空闲时所有 row 输出保持低，只有扫描时当前 row 短暂为高（与示波器/硬件一致）
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y
